services:
  # Основной контейнер с приложением
  hh-ai-applier:
    build: .
    container_name: hh-ai-applier
    # Оставляем контейнер запущенным, чтобы Ofelia могла заходить в него по расписанию
    command: tail -f /dev/null
    env_file: .env
    environment:
      PYTHONUNBUFFERED: 1
    volumes:
      - .:/app
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.hh-apply.run-on-startup: "true"
      ofelia.job-exec.hh-apply.schedule: ${OFELIA_SCHEDULE:-@every 4h}
      ofelia.job-exec.hh-apply.command: "hh-ai-applier -max-responses 500 -l debug"

  # Планировщик Ofelia
  scheduler:
    image: mcuadros/ofelia:latest
    container_name: hh-scheduler
    depends_on:
      - hh-ai-applier
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      #- ./logs:/logs
    restart: unless-stopped
    # labels:
    #   ofelia.save-folder: "/logs"
